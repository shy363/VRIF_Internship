<!-- Instructions
Inside the editor, complete the following steps:

    In the @font-face rule, set font-family to myFirstFont
    In the @font-face rule, set src to url(sansation_light.woff)
    Apply the custom font to the h1 using font-family: myFirstFont -->

<!DOCTYPE html>
<html>
<head>
<style>
@font-face {
  font-family: myFirstFont;
  src: url(sansation_light.woff);
}

h1 {
  font-family: myFirstFont;
}
</style>
</head>
<body>

<h1>Custom Web Font</h1>
<p>This paragraph uses the default font.</p>

</body>
</html>
