<!-- Instructions
Inside the editor, complete the following steps:

    Make the video responsive: set video max-width to 100% and height to auto

Using max-width instead of width ensures the video scales down on small screens but never scales up larger than its original size. -->

<!DOCTYPE html>
<html>
<head>
<style>
video {
  max-width: 100%;
  height: auto;
}
</style>
</head>
<body>

<h2>Responsive Video</h2>
<video controls>
  <source src="https://www.w3schools.com/html/movie.mp4" type="video/mp4">
  <source src="https://www.w3schools.com/html/movie.ogg" type="video/ogg">
</video>

</body>
</html>
