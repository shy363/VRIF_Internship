<!-- Instructions
Inside the editor, complete the following steps:

    Set the .box margin-top to 30px and margin-bottom to 30px (individual sides)
    Set the .box margin-left to 50px
    Add a .centered rule: set width to 300px and margin to 0 auto (auto centers horizontally) -->

<!DOCTYPE html>
<html>
<head>
<style>
.box {
  background-color: #04AA6D;
  color: white;
  padding: 15px;
  margin-top: 30px;
  margin-bottom: 30px;
  margin-left: 50px;
}

.centered {
  width: 300px;
  margin: 0 auto;
}
</style>
</head>
<body>

<div class="box">This box uses individual margin sides.</div>
<div class="centered" style="background:dimgray;color:white;padding:15px;">This box is centered with margin auto.</div>

</body>
</html>
