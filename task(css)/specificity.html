<!-- Instructions
Inside the editor, complete the following steps:

    Use the higher-specificity selector p.text to set color to blue
    Use the even higher-specificity selector #main to set color to red -->

<!DOCTYPE html>
<html>
<head>
<style>
.text {
  color: green;
}

p.text {
  color: blue;
}

#main {
  color: red;
}
</style>
</head>
<body>

<p id="main" class="text">What color am I?</p>

</body>
</html>
