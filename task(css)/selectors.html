<!-- Instructions
Inside the editor, complete the following steps:

    Use an element selector to set all p elements color to dimgray
    Use a class selector to set .highlight background-color to yellow
    Use an id selector to set #intro font-size to 20px
 -->

<!DOCTYPE html>
<html>
<head>
<style>
p {
  color: dimgray;
}

.highlight {
  background-color: yellow;
}

#intro {
  font-size: 20px;
}
</style>
</head>
<body>

<p id="intro">Welcome to CSS selectors.</p>
<p>This is a normal paragraph.</p>
<p class="highlight">This paragraph is highlighted.</p>

</body>
</html>
