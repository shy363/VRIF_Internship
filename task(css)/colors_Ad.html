<!-- Instructions
Inside the editor, complete the following steps:

    Set the #rgba-box background-color to rgba(255, 0, 0, 0.5) (semi-transparent red)
    Set the #hsla-box background-color to hsla(120, 100%, 50%, 0.3) (semi-transparent green)
    Set the #hex-box background-color to #ff6347 (Tomato in hex) -->

<!DOCTYPE html>
<html>
<head>
<style>
div {
  padding: 20px;
  margin: 10px 0;
  color: white;
}

#rgba-box {
  background-color: rgba(255, 0, 0, 0.5);
}

#hsla-box {
  background-color: hsla(120, 100%, 50%, 0.3);
}

#hex-box {
  background-color: #ff6347;
}
</style>
</head>
<body>

<div id="rgba-box">RGBA — semi-transparent red</div>
<div id="hsla-box">HSLA — semi-transparent green</div>
<div id="hex-box">HEX — Tomato</div>

</body>
</html>
