<!-- Instructions
Inside the editor, complete the following steps:

    Set the div width to 300px
    Add 25px of padding (space inside the border)
    Add a border of 5px solid navy
    Add 20px of margin (space outside the border) -->

<!DOCTYPE html>
<html>
<head>
<style>
div {
  background-color: lightgray;
  width: 300px;
  padding: 25px;
  border: 5px solid navy;
  margin: 20px;
}
</style>
</head>
<body>

<p>The CSS box model wraps every element: margin, border, padding, content.</p>
<div>This box has all four parts of the box model.</div>

</body>
</html>
