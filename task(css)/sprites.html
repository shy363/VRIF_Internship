<!-- Instructions
Inside the editor, complete the following steps:

    Set the .icon background-image to url('https://www.w3schools.com/css/img_navsprites.gif')
    Set the .icon width to 43px and height to 44px
    Set the .icon-next background-position to -91px 0
 -->

 <!DOCTYPE html>
<html>
<head>
<style>
.icon {
  display: inline-block;
  background-image: url('https://www.w3schools.com/css/img_navsprites.gif');
  width: 43px;
  height: 44px;
}

.icon-home {
  background-position: 0 0;
}

.icon-next {
  background-position: -91px 0;
}
</style>
</head>
<body>

<span class="icon icon-home"></span>
<span class="icon icon-next"></span>

</body>
</html>
