<!-- Instructions
Inside the editor, complete the following steps:

    Make the li elements display inline (horizontal navigation)
    Make the span elements display as block
    Hide the element with class .hidden using display: none -->

<!DOCTYPE html>
<html>
<head>
<style>
li {
  display: inline;
}

span {
  background-color: yellow;
  display: block;
}

.hidden {
  display: none;
}
</style>
</head>
<body>

<ul>
  <li>Home</li>
  <li>About</li>
  <li>Contact</li>
</ul>

<p>These spans are <span>now</span> <span>block</span> elements.</p>

<p class="hidden">This paragraph is hidden.</p>

</body>
</html>
