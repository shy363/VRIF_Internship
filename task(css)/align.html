<!-- Instructions
Inside the editor, complete the following steps:

    Center the div horizontally using margin: auto (it already has a width)
    Center the text inside the div using text-align: center
    Center the img by making it display: block with margin: auto -->

<!DOCTYPE html>
<html>
<head>
<style>
div {
  width: 60%;
  border: 1px solid gray;
  padding: 20px;
  margin: auto;
  text-align: center;
}

img {
  width: 200px;
  display: block;
  margin: auto;
}
</style>
</head>
<body>

<div>
  <h1>Centered Content</h1>
  <p>This box and its text are centered.</p>
</div>

<img src="img_5terre.jpg" alt="Cinque Terre">

</body>
</html>
