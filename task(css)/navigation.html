<!-- Instructions
Inside the editor, complete the following steps:

    Style the navbar: set .navbar background-color to dimgray and overflow to hidden
    Style the links: set .navbar a float to left, color to white, and padding to 14px 16px
    Set .navbar a text-decoration to none
    Set .navbar a:hover background-color to #04AA6D -->

<!DOCTYPE html>
<html>
<head>
<style>
.navbar {
  background-color: dimgray;
  overflow: hidden;
}

.navbar a {
  float: left;
  color: white;
  padding: 14px 16px;
  text-decoration: none;
}

.navbar a:hover {
  background-color: #04AA6D;
}
</style>
</head>
<body>

<div class="navbar">
  <a href="#">Home</a>
  <a href="#">About</a>
  <a href="#">Services</a>
  <a href="#">Contact</a>
</div>

<h2>Welcome</h2>
<p>This is a horizontal navigation bar.</p>

</body>
</html>
