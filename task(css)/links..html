<!-- Instructions
Inside the editor, complete the following steps:

    Style a:link with color #04AA6D and text-decoration none
    Style a:visited with color gray
    Add an a:hover rule: set color to #028a4e and text-decoration to underline -->

<!DOCTYPE html>
<html>
<head>
<style>
a:link {
  color: #04AA6D;
  text-decoration: none;
}

a:visited {
  color: gray;
}

a:hover {
  color: #028a4e;
  text-decoration: underline;
}
</style>
</head>
<body>

<h2>Styled Links</h2>
<p><a href="https://www.w3schools.com">W3Schools</a></p>
<p><a href="https://www.w3schools.com/css">CSS Tutorial</a></p>

</body>
</html>
