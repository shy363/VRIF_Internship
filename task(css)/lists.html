<!-- Instructions
Inside the editor, complete the following steps:

    Set the ul list-style-type to none (remove bullets)
    Set the ul padding to 0
    Add a li rule: set padding to 8px 16px, background-color to #f1f1f1, and margin-bottom to 2px -->

<!DOCTYPE html>
<html>
<head>
<style>
ul {
  list-style-type: none;
  padding: 0;
}

li {
  padding: 8px 16px;
  background-color: #f1f1f1;
  margin-bottom: 2px;
}
</style>
</head>
<body>

<h2>Navigation Menu</h2>
<ul>
  <li>Home</li>
  <li>About</li>
  <li>Services</li>
  <li>Contact</li>
</ul>

</body>
</html>
