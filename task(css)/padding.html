<!-- Instructions
Inside the editor, complete the following steps:

    Set the .box1 padding using individual sides: padding-top 20px, padding-right 30px, padding-bottom 20px, padding-left 30px
    Add a .box2 rule: set the same padding using the 4-value shorthand: 20px 30px 20px 30px -->

<!DOCTYPE html>
<html>
<head>
<style>
.box1 {
  background-color: #04AA6D;
  color: white;
  padding-top: 20px;
  padding-right: 30px;
  padding-bottom: 20px;
  padding-left: 30px;
}

.box2 {
  padding: 20px 30px 20px 30px;
}
</style>
</head>
<body>

<div class="box1">Individual padding sides</div>
<br>
<div class="box2" style="background-color:#2196F3;color:white;">Padding shorthand (same result)</div>

</body>
</html>
