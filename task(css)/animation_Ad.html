<!-- Instructions
Inside the editor, complete the following steps:

    Create a @keyframes rule named slide
    At 0%, set background-color to red and left to 0px
    At 100%, set background-color to blue and left to 200px
    Apply the animation to the div using the shorthand: slide 2s infinite -->

<!DOCTYPE html>
<html>
<head>
<style>
div {
  width: 100px;
  height: 100px;
  color: white;
  text-align: center;
  line-height: 100px;
  position: relative;
  animation: slide 2s infinite;
}

@keyframes slide {
  0% { background-color: red; left: 0px; }
  100% { background-color: blue; left: 200px; }
}
</style>
</head>
<body>

<div>Slide!</div>

</body>
</html>
