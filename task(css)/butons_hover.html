<!-- Instructions
Inside the editor, complete the following steps:

    Style the .btn: set background-color to #04AA6D, color to white, padding to 14px 28px, border to none, and cursor to pointer
    On hover (.btn:hover), set background-color to #059862
    Style .btn-outline: set background-color to transparent, border to 2px solid #04AA6D, and color to #04AA6D -->

<!DOCTYPE html>
<html>
<head>
<style>
.btn {
  font-size: 16px;
  background-color: #04AA6D;
  color: white;
  padding: 14px 28px;
  border: none;
  cursor: pointer;
}

.btn:hover {
  background-color: #059862;
}

.btn-outline {
  font-size: 16px;
  padding: 14px 28px;
  cursor: pointer;
  background-color: transparent;
  border: 2px solid #04AA6D;
  color: #04AA6D;
}
</style>
</head>
<body>

<button class="btn">Filled Button</button>
<button class="btn-outline">Outline Button</button>

</body>
</html>
