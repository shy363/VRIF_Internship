<!-- Instructions
Inside the editor, complete the following steps:

    Make the overlay cover the full screen: set .modal position to fixed, and top, left, width, height all to cover the viewport (0, 0, 100%, 100%)
    Set the .modal background-color to rgba(0, 0, 0, 0.8)
    Center the modal image: set .modal img display to block and margin to auto -->

<!DOCTYPE html>
<html>
<head>
<style>
.modal {
  display: flex;
  align-items: center;
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background-color: rgba(0, 0, 0, 0.8);
}

.modal img {
  max-width: 80%;
  display: block;
  margin: auto;
}
</style>
</head>
<body>

<div class="modal">
  <img src="https://www.w3schools.com/css/img_5terre.jpg" alt="Cinque Terre">
</div>

</body>
</html>
