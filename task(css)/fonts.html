<!-- Instructions
Inside the editor, complete the following steps:

    Set the .serif font-family to "Times New Roman", Times, serif
    Set the .sans font-family to Arial, Helvetica, sans-serif
    Add a .mono rule: set font-family to "Courier New", Courier, monospace -->

<!DOCTYPE html>
<html>
<head>
<style>
.serif {
  font-family: "Times New Roman", Times, serif;
}

.sans {
  font-family: Arial, Helvetica, sans-serif;
}

.mono {
  font-family: "Courier New", Courier, monospace;
}
</style>
</head>
<body>

<p class="serif">This is a serif font (Times New Roman).</p>
<p class="sans">This is a sans-serif font (Arial).</p>
<p class="mono">This is a monospace font (Courier New).</p>

</body>
</html>
