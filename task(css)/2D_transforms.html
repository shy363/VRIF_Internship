<!-- Instructions
Inside the editor, complete the following steps:

    Rotate #rotate by 20deg using transform: rotate(20deg)
    Scale #scale to 1.5 times its size using transform: scale(1.5)
    Move #translate 50px right and 20px down using transform: translate(50px, 20px)
 -->

<!DOCTYPE html>
<html>
<head>
<style>
div {
  width: 100px;
  height: 100px;
  background-color: #04AA6D;
  color: white;
  margin: 40px;
  display: inline-block;
  text-align: center;
  line-height: 100px;
}

#rotate {
  transform: rotate(20deg);
}

#scale {
  transform: scale(1.5);
}

#translate {
  transform: translate(50px, 20px);
}
</style>
</head>
<body>

<div id="rotate">Rotate</div>
<div id="scale">Scale</div>
<div id="translate">Move</div>

</body>
</html>
