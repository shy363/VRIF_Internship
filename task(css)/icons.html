<!-- Instructions
Inside the editor, complete the following steps:

    Add the Font Awesome icon library: insert a <link> with rel "stylesheet" and href "https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css"
    Use the library: add the class fa fa-cloud to the first <i> element
    Add the class fa fa-heart to the second <i> element
    Style the icons: set .fa font-size to 36px and color to #04AA6D
 -->

<!DOCTYPE html>
<html>
<head>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
<style>
.fa {
  font-size: 36px;
  color: #04AA6D;
}
</style>
</head>
<body>

<p>Cloud: <i class="fa fa-cloud"></i></p>
<p>Heart: <i class="fa fa-heart"></i></p>

</body>
</html>
