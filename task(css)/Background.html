<!-- Instructions
Inside the editor, complete the following steps:

    In the body selector, set background-color to lightblue
    In the body selector, set background-image to url('img_tree.png')
    In the body selector, set background-repeat to no-repeat
    In the body selector, set background-position to right top -->

<!DOCTYPE html>
<html>
<head>
<style>
body {
  background-color: lightblue;
  background-image: url('img_tree.png');
  background-repeat: no-repeat;
  background-position: right top;
}
</style>
</head>
<body>

<h1>CSS Background</h1>
<p>A background color and a background image can be set together. The color shows where the image does not cover.</p>

</body>
</html>
