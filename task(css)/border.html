<!-- Instructions
Inside the editor, complete the following steps:

    Give p.solid a solid border style
    Give p.dashed a dashed border style
    Give p.thick a border using the shorthand: 3px solid red
    Give p.rounded a solid border and a border-radius of 5px -->

<!DOCTYPE html>
<html>
<head>
<style>
p.solid {
  border-style: solid;
}

p.dashed {
  border-style: dashed;
}

p.thick {
  border: 3px solid red;
}

p.rounded {
  border-style: solid;
  border-radius: 5px;
}
</style>
</head>
<body>

<p class="solid">A solid border.</p>
<p class="dashed">A dashed border.</p>
<p class="thick">A thick red border.</p>
<p class="rounded">A rounded border.</p>

</body>
</html>
