<!-- Instructions
Inside the editor, complete the following steps:

    Use max-width (instead of width) to set the maximum width of the div to 500px
    Center the div horizontally with margin: auto

Note: Using max-width instead of width allows the element to shrink on smaller screens. -->

<!DOCTYPE html>
<html>
<head>
<style>
div {
  max-width: 500px;
  margin: auto;
  border: 3px solid #73AD21;
}
</style>
</head>
<body>

<div>This div has a max-width of 500px and is centered.</div>

</body>
</html>
